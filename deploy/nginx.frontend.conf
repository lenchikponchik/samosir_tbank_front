# ──────────────────────────────────────────────────────────────
# nginx.conf — Full-stack (Frontend + Backend + ML)
# ──────────────────────────────────────────────────────────────
# Замените nginx/nginx.conf в бэкенд-репо (Samosir_tbank/)
# этим файлом при деплое с фронтендом.
# ──────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ──────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    upstream ml_service {
        server ml_service:8001;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ── Rate limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name localhost;

        # Gzip compression
        gzip on;
        gzip_types application/json text/plain application/javascript text/css;
        gzip_min_length 1000;

        # ── Backend API ───────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Rate limiting for estimation endpoint (heavier computation)
        location /api/v1/estimates {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── OpenAPI docs ──────────────────────────────────
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Health checks ─────────────────────────────────
        location /health {
            proxy_pass http://backend;
        }

        # ── Next.js static files ──────────────────────────
        location /_next/static {
            proxy_pass http://frontend;
            proxy_cache_valid 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next.js frontend (catch-all) ──────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (for Next.js HMR in dev)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
